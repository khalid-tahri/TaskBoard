<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Tâches Kanban</title>
    <!-- Utilisation de la police Inter pour un rendu moderne et premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="app-logo">
            <svg viewBox="0 0 24 24" width="32" height="32" stroke="url(#logo-gradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                <defs>
                    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#6366f1" />
                        <stop offset="100%" stop-color="#a855f7" />
                    </linearGradient>
                </defs>
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
                <line x1="15" y1="3" x2="15" y2="21"></line>
            </svg>
            <h1>TaskBoard</h1>
        </div>
        <div class="header-right">
            <button id="theme-toggle-btn" class="icon-btn" aria-label="Basculer le thème">
                <svg id="moon-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sun-icon" class="d-none" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
            <button id="add-task-btn" class="primary-btn">
                <!-- Icône "Plus" SVG -->
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Nouvelle Tâche
            </button>
        </div>
    </header>

    <main class="kanban-board">
        <!-- Colonne : À faire -->
        <section class="kanban-column" data-status="todo">
            <header class="column-header">
                <h2>À faire</h2>
                <span class="task-count" id="count-todo">0</span>
            </header>
            <div class="task-list" id="list-todo"></div>
        </section>

        <!-- Colonne : En cours -->
        <section class="kanban-column" data-status="in-progress">
            <header class="column-header">
                <h2>En cours</h2>
                <span class="task-count" id="count-in-progress">0</span>
            </header>
            <div class="task-list" id="list-in-progress"></div>
        </section>

        <!-- Colonne : Terminé -->
        <section class="kanban-column" data-status="done">
            <header class="column-header">
                <h2>Terminé</h2>
                <span class="task-count" id="count-done">0</span>
            </header>
            <div class="task-list" id="list-done"></div>
        </section>
    </main>

    <!-- Modale d'ajout de tâche -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <h2 id="modal-title">Ajouter une tâche</h2>
                <button id="close-modal-btn" class="icon-btn">&times;</button>
            </header>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Titre <span class="required">*</span></label>
                    <input type="text" id="task-title" required placeholder="Ex: Mettre à jour la documentation">
                </div>
                <div class="form-group">
                    <label for="task-priority">Priorité</label>
                    <select id="task-priority">
                        <option value="low">Basse</option>
                        <option value="medium" selected>Moyenne</option>
                        <option value="high">Haute</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-module">Module</label>
                    <select id="task-module" required>
                        <option value="" disabled selected>Choisir un module</option>
                        <option value="Creativity, innovation and design thinking">Creativity, innovation and design thinking</option>
                        <option value="L’ingénierie du prompting">L’ingénierie du prompting</option>
                        <option value="Culture entrepreuneurale et techniques de communication">Culture entrepreuneurale et techniques de communication</option>
                        <option value="Introduction à la neuroéducation">Introduction à la neuroéducation</option>
                        <option value="Introduction aux technologies de l'éducation">Introduction aux technologies de l'éducation</option>
                        <option value="Méthodologie de recherche">Méthodologie de recherche</option>
                        <option value="Pragmatique de la communication et de l’apprentissage">Pragmatique de la communication et de l’apprentissage</option>
                        <option value="Séminaire de recherche">Séminaire de recherche</option>
                        <option value="Sémiotique et communication">Sémiotique et communication</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="4" placeholder="Détails supplémentaires (optionnel)"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-task-btn" class="secondary-btn">Annuler</button>
                    <button type="submit" class="primary-btn">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="app-footer">
        <p>Copyright - TAHRI Khalid - Master d'excellence CEN</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
